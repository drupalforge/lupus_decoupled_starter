include:
  - base/docker-compose.base.yml

services:
  app:
    image: drupalforge/lupus_decoupled_starter:main
    environment:
      DP_APP_ID: 'lupus_decoupled_starter'
      APP_ROOT: '/var/www/html'
      WEB_ROOT: '/var/www/html/web'
      # Devcontainer-only unzip defaults for virtiofs metadata compatibility.
      UNZIPOPT: '-o -DD'
      CODES_USER_DATA_DIR: '/var/www/html/.vscode'
      CODES_WORKING_DIR: '/var/www/html'
      APACHE_RUN_USER: 'www'
      APACHE_RUN_GROUP: 'www'
      COMPOSER_HOME: '/home/www/.config/composer'
      CODES_ENABLE: 'no'
      DRUPALFORGE_DEVCONTAINER: true
      DB_HOST: db
      DB_PORT: 3306
      DB_ROOT_PASSWORD: root
      DB_NAME: drupaldb
      DB_USER: user
      DB_PASSWORD: password
      DB_DRIVER: mysql
    volumes:
      - "..:/var/www/html"
    depends_on:
      db:
        condition: service_healthy
      init-source-code:
        condition: service_completed_successfully

  init-source-code:
    # init-source-code: create-time service run by VS Code to import code and DB
    # from the image into the host bind. It mounts the host project at
    # /var/www/build, stashes local changes, temporarily removes the
    # /.devpanel/init-container.sh marker so the image's init script will
    # perform the sync, then restores the git working tree before exit. This
    # service is intended to run only at container creation.
    image: drupalforge/lupus_decoupled_starter:main
    environment:
      APP_ROOT: /var/www/html
      DB_SYNC_VOL: yes
      DRUPALFORGE_DEVCONTAINER: true
      DB_HOST: db
      DB_PORT: 3306
      DB_ROOT_PASSWORD: root
      DB_NAME: drupaldb
      DB_USER: user
      DB_PASSWORD: password
      DB_DRIVER: mysql
    entrypoint:
      - sh
      - -c
      - |
        set -e
        git config --global --add safe.directory /var/www/build
        cd /var/www/build
        git stash -um "pre-image-sync-$$(date -u +%Y%m%dT%H%M%SZ)"
        rm -f .devpanel/init-container.sh
        "$$APP_ROOT"/.devpanel/init-container.sh
        git reset --hard --quiet
        git clean -df --quiet
        git stash list -1 | grep -i "pre-image-sync-" && git stash pop || :
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - "..:/var/www/build"
